<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard – MANTOS MUSIQUE</title>
  <link rel="stylesheet" href="assets/css/style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <header>
    <h1>MANTOS MUSIQUE</h1>
    <button id="logout">Déconnexion</button>
  </header>

  <section id="upload">
    <h2>Ajouter un morceau</h2>
    <form name="morceaux" method="POST" data-netlify="true" enctype="multipart/form-data">
      <input type="hidden" name="form-name" value="morceaux">
      <label>Titre du morceau
        <input type="text" name="titre" placeholder="Ex. Nuit à Kin" required>
      </label>
      <label>Artiste
        <input type="text" name="artiste" placeholder="Ex. Mantos" required>
      </label>
      <label>Fichier audio (MP3/WAV)
        <input type="file" name="audio" accept="audio/*" required>
      </label>
      <button type="submit">Stocker la musique</button>
    </form>
  </section>

  <section>
    <h2>Lecteur rapide</h2>
    <audio controls class="player" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
  </section>

  <section id="stats">
    <h2>Statistiques de la bibliothèque</h2>
    <canvas id="progressChart" width="600" height="300"></canvas>
  </section>

  <script src="assets/js/auth.js"></script>
  <script src="assets/js/upload.js"></script>
  <script src="assets/js/charts.js"></script>
</body>
</html>
